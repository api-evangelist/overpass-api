name: Overpass API
description: >
  Overpass API is a read-only OpenStreetMap data API that enables querying
  geographic features including nodes, ways, relations, and tags using the
  Overpass Query Language (QL). It supports complex spatial queries with
  filters for bounding boxes, tags, proximity, area containment, and element
  relationships, making it the primary tool for extracting custom subsets of
  OSM data programmatically.
image: https://overpass-api.de/img/osm_logo.png
tags:
  - OpenStreetMap
  - Geographic
  - Spatial
  - GIS
  - Maps
  - Open Data
  - Query Language
url: https://raw.githubusercontent.com/api-evangelist/overpass-api/refs/heads/main/apis.yml
